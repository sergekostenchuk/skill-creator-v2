name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: python-${{ matrix.python-version }} / node-20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Run Python tests
        run: pytest

      - name: Run npm smoke tests
        run: npm test --silent

      - name: Validate npm package contents
        run: npm pack --dry-run --json
